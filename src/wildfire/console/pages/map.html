<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map — Wildfire Console</title>
<link rel="stylesheet" href="/static/console.css">
<link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css">
<style>
  .site-badge { background:#fff; border-radius:10px; padding:1px 6px; font:600 10px 'IBM Plex Mono',monospace; }
  .leaflet-popup-content { font-family:'IBM Plex Sans',system-ui,sans-serif; margin:10px 12px; }
  .leaflet-container { font: inherit; }
</style>
</head>
<body>
<nav id="topnav" class="topnav"></nav>

<div style="display:grid; grid-template-columns:1fr 320px; gap:16px; padding:16px 28px 0; height:calc(100vh - 64px - 16px);">
  <div class="card" style="overflow:hidden; display:flex; flex-direction:column;">
    <div class="card-head">
      <div style="display:flex; align-items:center; gap:9px;">
        <span class="card-title">Hazard Map</span>
        <span class="mono" style="font-size:11px; color:var(--muted-3);" id="site-count"></span>
      </div>
      <div style="display:flex; align-items:center; gap:14px; font-size:11px; color:var(--muted);">
        <span><span class="legend-dot" style="background:#E05555;"></span> High</span>
        <span><span class="legend-dot" style="background:#F0A500;"></span> Medium</span>
        <span><span class="legend-dot" style="background:#3A9A3A;"></span> Low</span>
      </div>
    </div>
    <div id="tiles-banner" style="display:none; padding:10px 16px; background:#f4ecd6; border-bottom:1px solid #e6dab8; font-size:12px; color:#6b5a2a;">
      No offline satellite tiles for this area yet.
      <button id="dl-tiles" class="btn-quiet" style="padding:5px 10px; margin-left:8px;">Download map for current area</button>
      <span id="dl-tiles-status" class="mono" style="font-size:11px; margin-left:8px;"></span>
    </div>
    <div class="map-wrap" id="map" style="min-height:0; position:relative;"></div>
  </div>

  <div class="card" style="display:flex; flex-direction:column; overflow:hidden;">
    <div style="padding:14px 18px 10px;">
      <span class="card-title">Hazard sites</span>
      <div style="font-size:11px; color:var(--muted-3); margin-top:3px;" id="dedup-note"></div>
    </div>
    <div style="flex:1; overflow-y:auto;" id="site-list"></div>
  </div>
</div>

<script src="/static/console.js"></script>
<script src="/static/vendor/leaflet/leaflet.js"></script>
<script>
renderNav("map");
let INFO = null, SITES = [], LMAP = null, selectedSite = -1;
const rank = { high: 3, medium: 2, low: 1 };

/* -------------------------------------------------- fallback (no tiles) */
function initFallback() {
  const el = document.getElementById("map");
  const pins = gpsToPercent(SITES.map((s, i) => ({ ...s, id: String(i) })));
  let html = terrainSvg("wfm") + '<div class="map-grid-overlay"></div>';
  for (const p of pins) {
    const c = SEV[p.severity].color;
    html += `
      <div class="pin ${selectedSite === +p.id ? "selected" : ""}" data-id="${p.id}" style="left:${p.x}%; top:${p.y}%;">
        <span class="pin-ring" style="background:${c};"></span>
        <span class="pin-dot" style="background:${c}; box-shadow:0 0 0 2px ${c}55, 0 2px 8px rgba(0,0,0,.55);"></span>
        ${p.count > 1 ? `<span class="site-badge" style="position:absolute; left:12px; top:-10px;">${p.count}</span>` : ""}
      </div>`;
  }
  const sel = pins.find(p => +p.id === selectedSite);
  if (sel) {
    const below = sel.y < 38;
    html += `
      <div class="map-popup" data-popup style="left:${Math.min(Math.max(sel.x, 17), 83)}%; top:${sel.y}%;
           transform:${below ? "translate(-50%, 22px)" : "translate(-50%, calc(-100% - 22px))"};">
        ${sitePopupHtml(SITES[selectedSite], selectedSite)}
        <div class="tail" style="${below
          ? "top:-6px; border-left:1px solid #e2e0d6; border-top:1px solid #e2e0d6;"
          : "bottom:-6px; border-right:1px solid #e2e0d6; border-bottom:1px solid #e2e0d6;"}"></div>
      </div>`;
  }
  if (!pins.length) {
    html += '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#cdd6c0; opacity:.5; font-size:12px;" class="mono">No GPS-tagged detections yet</div>';
  }
  html += '<div class="map-attr">Stylized terrain — download tiles above for the real satellite map</div>';
  el.innerHTML = html;
}

document.getElementById("map").addEventListener("click", e => {
  if (LMAP) return; // leaflet handles its own events
  const pinEl = e.target.closest(".pin");
  if (pinEl) selectedSite = +pinEl.dataset.id === selectedSite ? -1 : +pinEl.dataset.id;
  else if (e.target.closest("[data-popup]")) return;
  else if (selectedSite === -1) return;
  else selectedSite = -1;
  initFallback(); drawList();
});

/* -------------------------------------------------- site list */
function drawList() {
  const order = SITES.map((s, i) => ({ s, i }))
    .sort((a, b) => (rank[b.s.severity] - rank[a.s.severity]) || (b.s.count - a.s.count));
  document.getElementById("site-list").innerHTML = order.map(({ s, i }) => `
    <div data-site="${i}" style="padding:12px 18px; border-bottom:1px solid var(--line-soft); cursor:pointer; ${selectedSite === i ? "background:#faf9f4;" : ""}">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <span style="font-size:12px; font-weight:600;">Site ${i + 1} · ${s.count} image${s.count === 1 ? "" : "s"}</span>
        ${sevBadge(s.severity)}
      </div>
      <div class="mono" style="font-size:11px; color:var(--muted-2); margin-top:3px;">${fmtCoord(s.lat, s.lon)}</div>
    </div>`).join("") ||
    '<div class="empty">No GPS-tagged detections yet.</div>';
  document.querySelectorAll("[data-site]").forEach(el =>
    el.addEventListener("click", () => {
      selectedSite = +el.dataset.site;
      if (LMAP) {
        LMAP.map.panTo([SITES[selectedSite].lat, SITES[selectedSite].lon]);
        LMAP.markers[selectedSite].openPopup();
        drawList();
      } else {
        initFallback(); drawList();
      }
    }));
}

/* -------------------------------------------------- tile download */
document.getElementById("dl-tiles").addEventListener("click", async () => {
  const btn = document.getElementById("dl-tiles");
  const st = document.getElementById("dl-tiles-status");
  btn.disabled = true;
  try {
    await api("/api/map/download", { method: "POST", headers: { "Content-Type": "application/json" },
                                     body: JSON.stringify({}) });
    const timer = setInterval(async () => {
      const s = await api("/api/map/download/status").catch(() => null);
      if (!s) return;
      st.textContent = `${s.done || 0}/${s.total || "?"} tiles${s.failed ? ` · ${s.failed} failed` : ""}`;
      if (s.state === "done") { clearInterval(timer); location.reload(); }
      if (s.state === "error") { clearInterval(timer); st.textContent = "failed: " + (s.error || ""); btn.disabled = false; }
    }, 1500);
  } catch (e) {
    st.textContent = e.message;
    btn.disabled = false;
  }
});

Promise.all([api("/api/map-info"), api("/api/map-data")]).then(([info, md]) => {
  INFO = info; SITES = md.sites;
  document.getElementById("site-count").textContent =
    `· ${SITES.length} site${SITES.length === 1 ? "" : "s"}`;
  document.getElementById("dedup-note").textContent =
    `${md.points} flagged image${md.points === 1 ? "" : "s"} merged into ${SITES.length} site${SITES.length === 1 ? "" : "s"} (≤${md.radius_m} m) — overlap dedup, tier 1`;
  if (INFO.tiles) {
    LMAP = initLeafletSites(document.getElementById("map"), SITES, INFO,
                            { overlays: true, onSelect: i => { selectedSite = i; drawList(); } });
  } else {
    document.getElementById("tiles-banner").style.display = "";
    initFallback();
  }
  drawList();
}).catch(e => toast("Failed to load map: " + e.message));
</script>
</body>
</html>
